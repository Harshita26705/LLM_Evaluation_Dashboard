services:
  - type: web
    name: llm-dashboard
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements_flask.txt
    startCommand: gunicorn flask_app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DISABLE_HEAVY_MODELS
        value: "true"
